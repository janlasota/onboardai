name: 'AI Context Gen'
description: 'Auto-generate and sync AI coding assistant context files (.cursorrules, CLAUDE.md, copilot-instructions.md, etc.)'
author: 'onboardai'

branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  formats:
    description: 'Comma-separated list of target formats (cursor, claude, copilot, windsurf, continue, aider, all)'
    required: false
    default: 'all'
  directory:
    description: 'Project directory to scan'
    required: false
    default: '.'
  enhance:
    description: 'Use LLM enhancement (requires ONBOARDAI_API_KEY secret)'
    required: false
    default: 'false'
  api-key:
    description: 'API key for --enhance mode (or set ONBOARDAI_API_KEY secret)'
    required: false
    default: ''
  create-pr:
    description: 'Create a PR with changes instead of committing directly to the branch'
    required: false
    default: 'true'
  commit-message:
    description: 'Commit message for context file updates'
    required: false
    default: 'chore: update AI context files'
  pr-branch:
    description: 'Branch name to use when creating a PR'
    required: false
    default: 'ai-context-update'

outputs:
  files-changed:
    description: 'Whether any context files were created or updated'
    value: ${{ steps.check-changes.outputs.changed }}
  generated-files:
    description: 'Comma-separated list of generated files'
    value: ${{ steps.generate.outputs.files }}
  pull-request-url:
    description: 'URL of the created pull request (when create-pr is true)'
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install onboardai
      shell: bash
      run: npm install -g onboardai

    - name: Generate context files
      id: generate
      shell: bash
      env:
        ONBOARDAI_API_KEY: ${{ inputs.api-key }}
      run: |
        FLAGS="--format ${{ inputs.formats }}"
        if [ "${{ inputs.enhance }}" = "true" ]; then
          FLAGS="$FLAGS --enhance"
        fi

        cd ${{ inputs.directory }}
        OUTPUT=$(obi init $FLAGS 2>&1)
        echo "$OUTPUT"

        # Extract generated file list
        FILES=$(echo "$OUTPUT" | grep "✓" | sed 's/.*✓ //' | tr '\n' ',' | sed 's/,$//')
        echo "files=$FILES" >> $GITHUB_OUTPUT

    - name: Check for changes
      id: check-changes
      shell: bash
      run: |
        cd ${{ inputs.directory }}
        if git diff --quiet && git diff --cached --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected in context files."
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Context files have been updated."
          git diff --stat
        fi

    - name: Configure git user
      if: steps.check-changes.outputs.changed == 'true'
      shell: bash
      run: |
        git config --global user.name "onboardai[bot]"
        git config --global user.email "onboardai[bot]@users.noreply.github.com"

    - name: Commit and push directly
      if: steps.check-changes.outputs.changed == 'true' && inputs.create-pr == 'false'
      shell: bash
      run: |
        cd ${{ inputs.directory }}
        git add .cursorrules CLAUDE.md .windsurfrules .continuerc.json .aider.conventions.md .github/copilot-instructions.md 2>/dev/null || true
        git commit -m "${{ inputs.commit-message }}"
        git push

    - name: Create Pull Request
      id: create-pr
      if: steps.check-changes.outputs.changed == 'true' && inputs.create-pr != 'false'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ github.token }}
        commit-message: ${{ inputs.commit-message }}
        branch: ${{ inputs.pr-branch }}
        delete-branch: true
        title: 'chore: update AI context files'
        body: |
          Auto-generated update to AI coding assistant context files.

          This PR was created by the [onboardai](https://github.com/janlasota/onboardai) action after detecting changes in the codebase.

          **Files updated:**
          ${{ steps.generate.outputs.files }}

          Please review the changes to ensure they accurately reflect your project's conventions.
        labels: |
          automated
          ai-context
